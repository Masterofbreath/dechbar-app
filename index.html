    <!-- Performance: Preconnect to Google Analytics -->

    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- Performance: Preconnect to Meta Pixel -->

    <!-- Google Analytics 4 (G-LVJSDXT0L6) -->
    <!-- send_page_view: false — page views are tracked via React Router (RootLayout) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LVJSDXT0L6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LVJSDXT0L6', { send_page_view: false });
    </script>
    
    <!-- Meta Pixel (1396357311736215) -->
    <!-- fbq('track', 'PageView') se NEVOLÁ tady — SPA tracking řeší RootLayout.tsx -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '1396357311736215');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1396357311736215&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel -->

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />

    <!-- App Info -->
    <meta name="application-name" content="DechBar" />
    <meta name="apple-mobile-web-app-title" content="DechBar" />
    <meta name="description" content="Dechová cvičení, gamifikace a wellbeing" />

    <!-- PWA: Web App Manifest (Android, Chrome, iOS 16.4+) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA: iOS Standalone Mode (Safari "Add to Home Screen")
         apple-mobile-web-app-capable  → spustí se v standalone módu (bez Safari chrome)
         apple-mobile-web-app-status-bar-style: black-translucent
           → WV se roztáhne přes celou obrazovku (včetně status baru)
           → env(safe-area-inset-top) = 47px (stejné jako Capacitor native app)
           → 100vh = celá výška obrazovky (stejné jako Capacitor native app)
         theme-color → barva status baru / browser chrome na Androidu -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#121212" />
    
    <title>DechBar - Dech je nový kofein</title>
  </head>
  <body>
    <!-- iOS PWA fix: nastav --app-height PŘED prvním render pasem.
         visualViewport.height = správná výška okamžitě (bez safe-area-inset-bottom).
         Fallback na innerHeight pokud visualViewport není dostupný (starší prohlížeče).
         useEffect v AppLayout.tsx pak hodnotu udržuje aktuální (rotace, keyboard). -->
    <script>
      (function() {
        var t0 = performance.now();
        var vv = window.visualViewport;
        var h = vv ? vv.height : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', h + 'px');

        // DIAGNOSTIKA — viditelné v Safari DevTools: Develop → [iPhone] → Console
        var isPwa = window.navigator.standalone === true ||
                    window.matchMedia('(display-mode: standalone)').matches;
        console.group('[AppHeight diag] inline script (HTML parse)');
        console.log('T (ms since nav)    :', Math.round(t0));
        console.log('--app-height set to :', h + 'px');
        console.log('visualViewport.h    :', vv ? vv.height : 'N/A (API unavailable)');
        console.log('window.innerHeight  :', window.innerHeight);
        console.log('screen.height       :', screen.height);
        console.log('isPWA standalone    :', isPwa);
        console.log('CSS 100dvh fallback : would have been used BEFORE this script ran');
        console.groupEnd();

        // Zachyť jak se visualViewport změní po finalizaci safe-area
        if (vv) {
          vv.addEventListener('resize', function onFirstResize() {
            var h2 = vv.height;
            var t2 = performance.now();
            document.documentElement.style.setProperty('--app-height', h2 + 'px');
            console.group('[AppHeight diag] visualViewport resize (safe-area finalized?)');
            console.log('T (ms since nav)    :', Math.round(t2));
            console.log('--app-height updated:', h2 + 'px');
            console.log('delta from inline   :', (h2 - h) + 'px  ← if nonzero, inline had wrong value!');
            console.groupEnd();
            // Nechej listener běžet — chceme vidět všechny změny
          });
        }      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
