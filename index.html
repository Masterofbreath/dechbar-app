    <!-- PWA: Web App Manifest (Android, Chrome, iOS 16.4+) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA: iOS Standalone Mode (Safari "Add to Home Screen")
         apple-mobile-web-app-capable  → spustí se v standalone módu (bez Safari chrome)
         apple-mobile-web-app-status-bar-style: black-translucent
           → WV se roztáhne přes celou obrazovku (včetně status baru)
           → env(safe-area-inset-top) = 47px (stejné jako Capacitor native app)
           → 100vh = celá výška obrazovky (stejné jako Capacitor native app)
         theme-color → barva status baru / browser chrome na Androidu -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#121212" />
    
    <title>DechBar - Dech je nový kofein</title>
  </head>
  <body>
    <!-- iOS PWA fix: nastav --app-height PŘED prvním render pasem.
         OPRAVA: používáme vv.height + vv.offsetTop (offsetTop je záporný na iOS PWA —
         iOS posouvá visual viewport nahoru o safe-area-inset-bottom).
         Správná použitelná výška = height + offsetTop, ne jen height. -->
    <script>
      (function() {
        var vv = window.visualViewport;
        // vv.offsetTop je záporný na iOS PWA (např. -34px pro home indicator).
        // height + offsetTop = skutečná použitelná výška bez iOS chrome.
        var h = vv
          ? Math.round(vv.height + (vv.offsetTop || 0))
          : window.innerHeight;
        document.documentElement.style.setProperty('--app-height', h + 'px');

        var isPwa = window.navigator.standalone === true ||
                    window.matchMedia('(display-mode: standalone)').matches;
        console.group('[AppHeight] inline script');
        console.log('vv.height    :', vv ? vv.height : 'N/A');
        console.log('vv.offsetTop :', vv ? (vv.offsetTop || 0) : 'N/A');
        console.log('--app-height :', h + 'px  (height + offsetTop)');
        console.log('screen.height:', screen.height);
        console.log('isPWA        :', isPwa);
        console.groupEnd();

        if (vv) {
          vv.addEventListener('resize', function() {
            var h2 = Math.round(vv.height + (vv.offsetTop || 0));
            document.documentElement.style.setProperty('--app-height', h2 + 'px');
          });
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
